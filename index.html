<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Pressups">
  <meta name="theme-color" content="#0f172a">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Daily Pressups</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --slate-950: #0f172a;
      --slate-900: #1e293b;
      --slate-800: #334155;
      --slate-700: #475569;
      --slate-500: #64748b;
      --slate-400: #94a3b8;
      --slate-300: #cbd5e1;
      --slate-100: #f1f5f9;
      --emerald-400: #34d399;
      --emerald-500: #10b981;
      --emerald-600: #059669;
      --amber-400: #fbbf24;
      --red-400: #f87171;
      --font-body: 'DM Sans', system-ui, sans-serif;
      --font-mono: 'DM Mono', ui-monospace, monospace;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html {
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
    }

    body {
      font-family: var(--font-body);
      background: var(--slate-950);
      color: var(--slate-100);
      height: 100%;
      display: flex;
      flex-direction: column;
      padding-top: var(--safe-top);
      padding-bottom: var(--safe-bottom);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: pan-y;
    }

    /* ── Header ── */
    header {
      padding: 20px 20px 0;
      text-align: center;
      position: relative;
    }

    header h1 {
      font-family: var(--font-mono);
      font-size: 14px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: var(--slate-500);
    }

    .sync-btn {
      position: absolute;
      top: 18px;
      right: 16px;
      background: none;
      border: none;
      font-family: var(--font-mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--slate-700);
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: color 0.2s ease;
    }

    .sync-btn:active  { background: var(--slate-900); }
    .sync-btn.synced  { color: var(--emerald-500); }
    .sync-btn.syncing { color: var(--amber-400); }
    .sync-btn.error   { color: var(--red-400); }

    /* ── Tab bar ── */
    .tab-bar {
      display: flex;
      padding: 12px 20px 0;
    }

    .tab-btn {
      flex: 1;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      padding: 8px 0 10px;
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--slate-600);
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .tab-btn.active {
      color: var(--emerald-400);
      border-bottom-color: var(--emerald-400);
    }

    /* ── Today view ── */
    #todayView {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }

    .today-total {
      text-align: center;
      padding: 32px 20px 8px;
    }

    .today-total .count {
      font-family: var(--font-mono);
      font-size: 80px;
      font-weight: 500;
      line-height: 1;
      color: var(--emerald-400);
      transition: transform 0.15s ease;
    }

    .today-total .count.bump {
      transform: scale(1.08);
    }

    .today-total .label {
      font-size: 13px;
      color: var(--slate-500);
      margin-top: 6px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .today-date {
      text-align: center;
      font-size: 13px;
      color: var(--slate-700);
      padding-bottom: 24px;
    }

    /* ── Input area ── */
    .input-area {
      padding: 0 20px 24px;
      display: flex;
      gap: 10px;
    }

    .input-area input {
      flex: 1 1 0;
      min-width: 0;
      background: var(--slate-900);
      border: 2px solid var(--slate-800);
      border-radius: 14px;
      padding: 16px 18px;
      font-family: var(--font-mono);
      font-size: 22px;
      color: var(--slate-100);
      outline: none;
      text-align: center;
      transition: border-color 0.2s ease;
      appearance: none;
      -webkit-appearance: none;
    }

    .input-area input::-webkit-outer-spin-button,
    .input-area input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .input-area input::placeholder {
      color: var(--slate-700);
      font-size: 16px;
    }

    .input-area input:focus {
      border-color: var(--emerald-500);
    }

    .input-area button {
      flex: 0 0 auto;
      background: var(--emerald-500);
      color: var(--slate-950);
      border: none;
      border-radius: 14px;
      padding: 16px 24px;
      font-family: var(--font-body);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s ease, transform 0.1s ease;
      white-space: nowrap;
    }

    .input-area button:active {
      background: var(--emerald-600);
      transform: scale(0.96);
    }

    /* ── Sessions list ── */
    .sessions-section {
      flex: 1;
      min-height: 0;
      padding: 0 20px;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }

    .sessions-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .sessions-header h2 {
      font-size: 13px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--slate-500);
    }

    .sessions-header .session-count {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--slate-700);
    }

    .sessions-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding-bottom: 24px;
    }

    .session-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--slate-900);
      border-radius: 12px;
      padding: 14px 16px;
      animation: slideIn 0.25s ease-out;
    }

    .session-item .session-count-val {
      font-family: var(--font-mono);
      font-size: 20px;
      font-weight: 500;
      color: var(--slate-100);
    }

    .session-item .session-time {
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--slate-600);
    }

    .session-item .session-delete {
      background: none;
      border: none;
      color: var(--slate-800);
      font-size: 18px;
      padding: 4px 8px;
      cursor: pointer;
      border-radius: 8px;
      transition: color 0.15s ease, background 0.15s ease;
    }

    .session-item .session-delete:active {
      color: var(--red-400);
      background: rgba(248, 113, 113, 0.1);
    }

    .session-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--slate-700);
      font-size: 14px;
      line-height: 1.6;
    }

    .empty-state .empty-icon {
      font-size: 32px;
      margin-bottom: 12px;
      opacity: 0.4;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Stats view ── */
    #statsView {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 20px 20px 10px;
    }

    .stat-card {
      background: var(--slate-900);
      border-radius: 12px;
      padding: 16px;
    }

    .stat-value {
      font-family: var(--font-mono);
      font-size: 36px;
      font-weight: 500;
      line-height: 1;
      color: var(--slate-100);
      margin-bottom: 6px;
    }

    .stat-value.emerald { color: var(--emerald-400); }

    .stat-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--slate-500);
    }

    .stat-delta {
      font-family: var(--font-mono);
      font-size: 11px;
      margin-top: 5px;
    }

    .stat-delta.up   { color: var(--emerald-500); }
    .stat-delta.down { color: var(--red-400); }

    /* ── Bar chart ── */
    .chart-section {
      padding: 10px 20px 32px;
    }

    .chart-title {
      font-family: var(--font-mono);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--slate-500);
      margin-bottom: 16px;
    }

    .chart-bars {
      display: flex;
      align-items: flex-end;
      gap: 6px;
      height: 110px;
      margin-bottom: 8px;
    }

    .bar-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      height: 100%;
      gap: 3px;
    }

    .bar-count {
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--slate-600);
      text-align: center;
      min-height: 11px;
      line-height: 11px;
    }

    .bar-count.today { color: var(--emerald-400); }

    .bar {
      width: 100%;
      background: var(--slate-800);
      border-radius: 3px 3px 0 0;
    }

    .bar.today { background: var(--emerald-500); }

    .chart-days {
      display: flex;
      gap: 6px;
    }

    .bar-day-label {
      flex: 1;
      text-align: center;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--slate-600);
      text-transform: uppercase;
    }

    .bar-day-label.today { color: var(--emerald-400); }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: calc(24px + var(--safe-bottom));
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--slate-800);
      color: var(--slate-100);
      font-family: var(--font-mono);
      font-size: 14px;
      padding: 12px 24px;
      border-radius: 12px;
      opacity: 0;
      transition: transform 0.3s ease, opacity 0.3s ease;
      pointer-events: none;
      z-index: 100;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

  <header>
    <h1>Pressups</h1>
    <button id="syncBtn" class="sync-btn" aria-label="Connect Google Sheets">connect</button>
  </header>

  <div class="tab-bar">
    <button class="tab-btn active" id="tabToday">Today</button>
    <button class="tab-btn" id="tabStats">Stats</button>
  </div>

  <div id="todayView">
    <div class="today-total">
      <div class="count" id="totalCount">0</div>
      <div class="label">today</div>
    </div>
    <div class="today-date" id="todayDate"></div>

    <div class="input-area">
      <input type="number" id="repInput" inputmode="numeric" pattern="[0-9]*" placeholder="reps" autocomplete="off">
      <button id="addBtn">Add</button>
    </div>

    <div class="sessions-section">
      <div class="sessions-header">
        <h2>Sessions</h2>
        <span class="session-count" id="sessionCount"></span>
      </div>
      <ul class="sessions-list" id="sessionsList"></ul>
      <div class="empty-state" id="emptyState" style="display:none;">
        <div class="empty-icon">💪</div>
        Get after it — add your first set
      </div>
    </div>
  </div>

  <div id="statsView" style="display:none;">
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value emerald" id="statStreak">0</div>
        <div class="stat-label">day streak</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statAllTime">0</div>
        <div class="stat-label">all time</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statBest">0</div>
        <div class="stat-label">best day</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statThisWeek">0</div>
        <div class="stat-label">this week</div>
        <div class="stat-delta" id="statWeekDelta"></div>
      </div>
    </div>

    <div class="chart-section">
      <div class="chart-title">Last 7 days</div>
      <div class="chart-bars" id="chartBars"></div>
      <div class="chart-days" id="chartDays"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    (() => {
      const STORAGE_KEY      = 'daily-pressups-v1';
      const SHEET_ID_KEY     = 'daily-pressups-sheet-id';
      const SHEET_TAB_ID_KEY = 'daily-pressups-sheet-tab-id';
      const CLIENT_ID        = '864950086095-8uc416m7ts9hbbmpp0g5dlhd1rjqfs0f.apps.googleusercontent.com';
      const SCOPE            = 'https://www.googleapis.com/auth/drive.file';

      // ── Elements ──
      const totalCountEl  = document.getElementById('totalCount');
      const todayDateEl   = document.getElementById('todayDate');
      const repInput      = document.getElementById('repInput');
      const addBtn        = document.getElementById('addBtn');
      const sessionsList  = document.getElementById('sessionsList');
      const sessionCountEl = document.getElementById('sessionCount');
      const emptyState    = document.getElementById('emptyState');
      const toastEl       = document.getElementById('toast');
      const syncBtn       = document.getElementById('syncBtn');

      // ── Date helpers ──
      function getLocalDate() {
        const now = new Date();
        return [
          now.getFullYear(),
          String(now.getMonth() + 1).padStart(2, '0'),
          String(now.getDate()).padStart(2, '0'),
        ].join('-');
      }

      function dateOffset(dateStr, days) {
        const [y, m, d] = dateStr.split('-').map(Number);
        const date = new Date(y, m - 1, d);
        date.setDate(date.getDate() + days);
        return [
          date.getFullYear(),
          String(date.getMonth() + 1).padStart(2, '0'),
          String(date.getDate()).padStart(2, '0'),
        ].join('-');
      }

      function getWeekStart(dateStr) {
        const [y, m, d] = dateStr.split('-').map(Number);
        const date = new Date(y, m - 1, d);
        const day = date.getDay();
        date.setDate(date.getDate() + (day === 0 ? -6 : 1 - day));
        return [
          date.getFullYear(),
          String(date.getMonth() + 1).padStart(2, '0'),
          String(date.getDate()).padStart(2, '0'),
        ].join('-');
      }

      function formatDate(dateStr) {
        const [y, m, d] = dateStr.split('-').map(Number);
        return new Date(y, m - 1, d).toLocaleDateString('en-GB', {
          weekday: 'long', day: 'numeric', month: 'long',
        });
      }

      function formatTime(isoString) {
        return new Date(isoString).toLocaleTimeString('en-GB', {
          hour: '2-digit', minute: '2-digit',
        });
      }

      function generateId() {
        return Date.now() + '-' + Math.random().toString(36).substring(2, 7);
      }

      // ── Data ──
      function loadAllEntries() {
        try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
        catch { return []; }
      }

      function saveAllEntries(entries) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
      }

      function getTodayEntries() {
        const today = getLocalDate();
        return loadAllEntries().filter(e => e.date === today);
      }

      function addEntry(count) {
        const entries = loadAllEntries();
        const entry = {
          id: generateId(),
          count,
          timestamp: new Date().toISOString(),
          date: getLocalDate(),
        };
        entries.push(entry);
        saveAllEntries(entries);
        syncAppend(entry);
        return entry;
      }

      function deleteEntry(id) {
        saveAllEntries(loadAllEntries().filter(e => e.id !== id));
        syncDelete(id);
      }

      // ── Google Sheets sync ──
      let tokenClient  = null;
      let accessToken  = null;
      let spreadsheetId = localStorage.getItem(SHEET_ID_KEY);
      let sheetTabId    = Number(localStorage.getItem(SHEET_TAB_ID_KEY)) || 0;

      function setSyncState(state) {
        const labels = { disconnected: 'connect', syncing: 'syncing…', synced: '● synced', error: 'retry' };
        syncBtn.className  = 'sync-btn ' + state;
        syncBtn.textContent = labels[state] || 'connect';
      }

      async function sheetsFetch(url, opts = {}) {
        if (!accessToken) throw new Error('no-token');
        const res = await fetch(url, {
          ...opts,
          headers: { ...(opts.headers || {}), Authorization: `Bearer ${accessToken}` },
        });
        if (res.status === 401) { accessToken = null; throw new Error('auth'); }
        if (!res.ok) throw new Error(`sheets-${res.status}`);
        return res.status === 204 ? null : res.json();
      }

      async function createSpreadsheet() {
        const data = await sheetsFetch('https://sheets.googleapis.com/v4/spreadsheets', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            properties: { title: 'Daily Pressups' },
            sheets: [{
              properties: { title: 'Entries' },
              data: [{ rowData: [{ values: ['id','count','timestamp','date'].map(h => ({
                userEnteredValue: { stringValue: h },
                userEnteredFormat: { textFormat: { bold: true } },
              }))}]}],
            }],
          }),
        });
        spreadsheetId = data.spreadsheetId;
        sheetTabId    = data.sheets[0].properties.sheetId;
        localStorage.setItem(SHEET_ID_KEY, spreadsheetId);
        localStorage.setItem(SHEET_TAB_ID_KEY, String(sheetTabId));
      }

      // Search Drive for an existing sheet this app created, and adopt it.
      // This lets Safari and the home-screen PWA share the same spreadsheet
      // even though they have separate localStorage.
      // Falls back to cached localStorage ID if Drive API is unavailable.
      async function findExistingSheet() {
        try {
          const q = encodeURIComponent(
            "name='Daily Pressups' and mimeType='application/vnd.google-apps.spreadsheet' and trashed=false"
          );
          const data = await sheetsFetch(
            `https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id)&orderBy=modifiedTime+desc&pageSize=1`
          );
          if (data && data.files && data.files.length) {
            const id = data.files[0].id;
            const meta = await sheetsFetch(
              `https://sheets.googleapis.com/v4/spreadsheets/${id}?fields=sheets.properties`
            );
            const sheet = (meta.sheets || []).find(s => s.properties.title === 'Entries');
            spreadsheetId = id;
            sheetTabId    = sheet ? sheet.properties.sheetId : 0;
            localStorage.setItem(SHEET_ID_KEY, spreadsheetId);
            localStorage.setItem(SHEET_TAB_ID_KEY, String(sheetTabId));
            return true;
          }
        } catch {
          // Drive API not enabled — fall back to cached sheet ID
        }
        return !!spreadsheetId;
      }

      async function readAllFromSheets() {
        const data = await sheetsFetch(
          `https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/Entries!A2:D`
        );
        return ((data && data.values) || []).map(([id, count, timestamp, date]) => ({
          id, count: parseInt(count, 10), timestamp, date,
        }));
      }

      async function bulkAppendToSheets(entries) {
        if (!entries.length) return;
        await sheetsFetch(
          `https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/Entries!A:D:append?valueInputOption=RAW`,
          {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ values: entries.map(e => [e.id, e.count, e.timestamp, e.date]) }),
          }
        );
      }

      async function deleteRowFromSheets(id) {
        const remote = await readAllFromSheets();
        const idx = remote.findIndex(e => e.id === id);
        if (idx === -1) return;
        const rowIndex = idx + 1;
        await sheetsFetch(`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}:batchUpdate`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            requests: [{ deleteDimension: { range: {
              sheetId: sheetTabId, dimension: 'ROWS',
              startIndex: rowIndex, endIndex: rowIndex + 1,
            }}}],
          }),
        });
      }

      function syncAppend(entry) {
        if (!accessToken || !spreadsheetId) return;
        setSyncState('syncing');
        bulkAppendToSheets([entry])
          .then(() => setSyncState('synced'))
          .catch(() => setSyncState('error'));
      }

      function syncDelete(id) {
        if (!accessToken || !spreadsheetId) return;
        setSyncState('syncing');
        deleteRowFromSheets(id)
          .then(() => setSyncState('synced'))
          .catch(() => setSyncState('error'));
      }

      async function onSignedIn() {
        setSyncState('syncing');
        try {
          const found = await findExistingSheet();
          if (found) {
            // Adopt the existing sheet — pull down canonical data
            const remote = await readAllFromSheets();
            saveAllEntries(remote);
            render();
            if (activeTab === 'stats') renderStats();
          } else {
            // First time ever — create sheet and upload any local data
            await createSpreadsheet();
            const local = loadAllEntries();
            if (local.length) await bulkAppendToSheets(local);
          }
          setSyncState('synced');
        } catch {
          setSyncState('error');
        }
      }

      function initGoogleAuth() {
        if (!window.google || !window.google.accounts) return;
        tokenClient = google.accounts.oauth2.initTokenClient({
          client_id: CLIENT_ID,
          scope: SCOPE,
          callback: (resp) => {
            if (resp.error || !resp.access_token) { setSyncState('disconnected'); return; }
            accessToken = resp.access_token;
            onSignedIn();
          },
          error_callback: () => setSyncState('disconnected'),
        });
        // Always attempt silent auth — works even when this context has no
        // cached sheet ID (e.g. PWA vs Safari having separate localStorage)
        try { tokenClient.requestAccessToken({ prompt: '' }); } catch {}
      }

      const gisCheck = setInterval(() => {
        if (window.google && window.google.accounts) { clearInterval(gisCheck); initGoogleAuth(); }
      }, 100);

      syncBtn.addEventListener('click', () => {
        if (!tokenClient) return;
        tokenClient.requestAccessToken({ prompt: accessToken ? '' : 'consent' });
      });

      // ── Stats ──
      function computeStats(allEntries) {
        const today = getLocalDate();

        const byDate = {};
        allEntries.forEach(e => { byDate[e.date] = (byDate[e.date] || 0) + e.count; });

        const allTimeTotal = allEntries.reduce((sum, e) => sum + e.count, 0);
        const bestDay = Object.values(byDate).reduce((a, b) => Math.max(a, b), 0);

        // Streak: consecutive days ending on today or yesterday
        let streak = 0;
        const anchor = byDate[today] ? today : dateOffset(today, -1);
        if (byDate[anchor]) {
          let check = anchor;
          while (byDate[check]) { streak++; check = dateOffset(check, -1); }
        }

        // This week (Mon–today) vs last full week (Mon–Sun)
        const weekStart     = getWeekStart(today);
        const lastWeekStart = dateOffset(weekStart, -7);
        const lastWeekEnd   = dateOffset(weekStart, -1);

        const thisWeekTotal = allEntries
          .filter(e => e.date >= weekStart && e.date <= today)
          .reduce((sum, e) => sum + e.count, 0);

        const lastWeekTotal = allEntries
          .filter(e => e.date >= lastWeekStart && e.date <= lastWeekEnd)
          .reduce((sum, e) => sum + e.count, 0);

        const last7 = Array.from({ length: 7 }, (_, i) => {
          const date = dateOffset(today, -(6 - i));
          return { date, total: byDate[date] || 0 };
        });

        return { allTimeTotal, streak, bestDay, thisWeekTotal, lastWeekTotal, last7 };
      }

      function renderStats() {
        const { allTimeTotal, streak, bestDay, thisWeekTotal, lastWeekTotal, last7 } =
          computeStats(loadAllEntries());

        document.getElementById('statStreak').textContent   = streak;
        document.getElementById('statAllTime').textContent  = allTimeTotal.toLocaleString();
        document.getElementById('statBest').textContent     = bestDay;
        document.getElementById('statThisWeek').textContent = thisWeekTotal;

        const deltaEl = document.getElementById('statWeekDelta');
        const delta   = thisWeekTotal - lastWeekTotal;
        if (lastWeekTotal === 0 && thisWeekTotal === 0) {
          deltaEl.textContent = '';
          deltaEl.className   = 'stat-delta';
        } else if (lastWeekTotal === 0) {
          deltaEl.textContent = 'first week!';
          deltaEl.className   = 'stat-delta up';
        } else {
          deltaEl.textContent = `${delta >= 0 ? '+' : ''}${delta} vs last wk`;
          deltaEl.className   = `stat-delta ${delta >= 0 ? 'up' : 'down'}`;
        }

        const today      = getLocalDate();
        const max        = Math.max(...last7.map(d => d.total), 1);
        const dayLetters = ['Su','Mo','Tu','We','Th','Fr','Sa'];

        document.getElementById('chartBars').innerHTML = last7.map(({ date, total }) => {
          const [y, m, d] = date.split('-').map(Number);
          const isToday = date === today;
          const h = total > 0 ? Math.max(Math.round((total / max) * 88), 6) : 0;
          return `<div class="bar-col">
            <div class="bar-count${isToday ? ' today' : ''}">${total > 0 ? total : ''}</div>
            <div class="bar${isToday ? ' today' : ''}" style="height:${h}px"></div>
          </div>`;
        }).join('');

        document.getElementById('chartDays').innerHTML = last7.map(({ date }) => {
          const [y, m, d] = date.split('-').map(Number);
          const isToday = date === today;
          const day = dayLetters[new Date(y, m - 1, d).getDay()];
          return `<div class="bar-day-label${isToday ? ' today' : ''}">${day}</div>`;
        }).join('');
      }

      // ── Tabs ──
      let activeTab = 'today';

      function switchTab(tab) {
        activeTab = tab;
        document.getElementById('todayView').style.display = tab === 'today' ? '' : 'none';
        document.getElementById('statsView').style.display = tab === 'stats' ? '' : 'none';
        document.getElementById('tabToday').classList.toggle('active', tab === 'today');
        document.getElementById('tabStats').classList.toggle('active', tab === 'stats');
        if (tab === 'stats') renderStats();
      }

      document.getElementById('tabToday').addEventListener('click', () => switchTab('today'));
      document.getElementById('tabStats').addEventListener('click', () => switchTab('stats'));

      // ── Toast ──
      let toastTimer;
      function showToast(msg) {
        toastEl.textContent = msg;
        toastEl.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2000);
      }

      // ── Render ──
      function render() {
        const today   = getLocalDate();
        todayDateEl.textContent = formatDate(today);

        const entries = getTodayEntries();
        const total   = entries.reduce((sum, e) => sum + e.count, 0);

        totalCountEl.textContent  = total;
        sessionCountEl.textContent = entries.length === 1 ? '1 set' : `${entries.length} sets`;

        if (entries.length === 0) {
          sessionsList.innerHTML = '';
          emptyState.style.display = 'block';
          sessionCountEl.textContent = '';
          return;
        }

        emptyState.style.display = 'none';
        sessionsList.innerHTML = [...entries].reverse().map(entry => `
          <li class="session-item" data-id="${entry.id}">
            <span class="session-count-val">${entry.count}</span>
            <div class="session-right">
              <span class="session-time">${formatTime(entry.timestamp)}</span>
              <button class="session-delete" aria-label="Delete" onclick="window._deleteEntry('${entry.id}')">✕</button>
            </div>
          </li>
        `).join('');
      }

      // ── Actions ──
      function handleAdd() {
        const val = parseInt(repInput.value, 10);
        if (!val || val <= 0) { repInput.focus(); return; }
        addEntry(val);
        repInput.value = '';
        repInput.focus();
        totalCountEl.classList.add('bump');
        setTimeout(() => totalCountEl.classList.remove('bump'), 150);
        showToast(`+${val}`);
        render();
      }

      window._deleteEntry = function(id) {
        const entry = loadAllEntries().find(e => e.id === id);
        if (entry) { deleteEntry(id); showToast(`−${entry.count}`); render(); }
      };

      // ── Events ──
      addBtn.addEventListener('click', handleAdd);

      repInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); handleAdd(); }
      });

      addBtn.addEventListener('touchend', (e) => { e.preventDefault(); handleAdd(); });

      let touchStartX = 0, touchStartY = 0;
      document.addEventListener('touchstart', (e) => {
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
      }, { passive: true });

      document.addEventListener('touchmove', (e) => {
        const dx = Math.abs(e.touches[0].clientX - touchStartX);
        const dy = Math.abs(e.touches[0].clientY - touchStartY);
        const inScrollable = [
          document.querySelector('.sessions-section'),
          document.getElementById('statsView'),
        ].some(el => el && el.contains(e.target));
        if (!inScrollable || dx > dy) e.preventDefault();
      }, { passive: false });

      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState !== 'visible') return;
        if (activeTab === 'today') render();
        else renderStats();
      });

      // ── Init ──
      render();
      repInput.focus();

      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      }
    })();
  </script>
</body>
</html>
